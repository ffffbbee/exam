<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Емтихан билеттері</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c26;
    --card: #1e2333;
    --card-hover: #252b3d;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #c8a96e;
    --accent2: #e8c98a;
    --text: #e8e6e0;
    --muted: #7a7d8a;
    --success: #3ecf8e;
    --gold-glow: rgba(200,169,110,0.15);
    --sidebar-w: 270px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }

  .layout {
    position: relative; z-index: 1;
    display: flex; min-height: 100vh;
  }

  /* ── MAIN ── */
  .main {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    margin-right: var(--sidebar-w);
  }

  header {
    padding: 2rem 2.5rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end;
    justify-content: space-between; gap: 1rem;
  }
  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem; color: var(--accent);
  }
  .header-left p {
    margin-top: 0.3rem; font-size: 0.78rem;
    color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase;
  }
  .stats { display: flex; gap: 1.75rem; align-items: flex-end; }
  .stat { text-align: right; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; line-height: 1; color: var(--accent);
  }
  .stat-num.green { color: var(--success); }
  .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  /* ── ALERT ── */
  .alert-bar {
    display: none; align-items: center; gap: 0.75rem;
    padding: 0.7rem 2.5rem;
    background: rgba(62,207,142,0.07);
    border-bottom: 1px solid rgba(62,207,142,0.18);
    animation: slideDown 0.3s ease;
  }
  .alert-bar.visible { display: flex; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .alert-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 8px var(--success); flex-shrink: 0;
  }
  .alert-text { font-size: 0.85rem; }
  .alert-text strong { color: var(--success); }

  /* ── GRID ── */
  .grid-wrap { padding: 1.75rem 2.5rem 3rem; }
  .grid-label {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1.1rem;
  }
  .tickets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 10px;
  }

  /* ── CARD ── */
  .ticket-card {
    aspect-ratio: 2/3;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    position: relative; overflow: hidden;
    transition: background 0.18s, border-color 0.18s, transform 0.14s, box-shadow 0.18s, opacity 0.4s, transform 0.4s;
  }
  .ticket-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.18s;
  }
  .ticket-card:hover {
    background: var(--card-hover); border-color: var(--border-hover);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,169,110,0.1);
  }
  .ticket-card:hover::before { opacity: 1; }
  .ticket-card:active { transform: scale(0.96); }

  .ticket-card.vanishing {
    opacity: 0 !important;
    transform: scale(0.75) !important;
    pointer-events: none;
  }
  .ticket-card.gone { display: none; }

  .card-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem; color: var(--accent); line-height: 1;
  }
  .card-word { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .card-deco {
    position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 3px; align-items: center;
  }
  .card-deco span { display: block; height: 1px; background: var(--border); }
  .card-deco span:nth-child(1) { width: 26px; }
  .card-deco span:nth-child(2) { width: 16px; }

  /* ── MODAL ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border-hover);
    border-radius: 16px; padding: 2.25rem;
    max-width: 400px; width: 90%; text-align: center;
    animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .modal-icon {
    width: 68px; height: 68px; border-radius: 50%;
    background: var(--gold-glow); border: 1px solid rgba(200,169,110,0.3);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 1.1rem;
  }
  .modal-num {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem; color: var(--accent); line-height: 1; margin-bottom: 0.2rem;
  }
  .modal-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 1.25rem; }
  .modal-filename {
    font-size: 0.82rem; color: var(--muted);
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.45rem 1rem;
    display: inline-block; font-family: monospace; margin-bottom: 1.5rem;
  }
  .btn-download {
    display: inline-flex; align-items: center; gap: 9px; justify-content: center;
    width: 100%; background: var(--accent); color: #0f1117;
    font-family: 'Source Sans 3', sans-serif; font-weight: 600; font-size: 0.95rem;
    padding: 0.7rem 2rem; border-radius: 8px; border: none;
    cursor: pointer; text-decoration: none;
    transition: background 0.15s, transform 0.1s; margin-bottom: 0.75rem;
  }
  .btn-download:hover { background: var(--accent2); }
  .btn-download:active { transform: scale(0.97); }
  .btn-download svg { width: 17px; height: 17px; flex-shrink: 0; }
  .btn-close {
    display: block; width: 100%; padding: 0.55rem;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-family: 'Source Sans 3', sans-serif; font-size: 0.83rem;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .btn-close:hover { border-color: var(--border-hover); color: var(--text); }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 10;
  }
  .sidebar-header {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sidebar-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.75rem; }
  .sidebar-counts { display: flex; gap: 1rem; }
  .sc-item { flex: 1; }
  .sc-num { font-family: 'Playfair Display', serif; font-size: 1.5rem; line-height: 1; }
  .sc-num.gold { color: var(--accent); }
  .sc-num.green { color: var(--success); }
  .sc-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .sidebar-list-label {
    padding: 0.75rem 1.25rem 0.4rem;
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); flex-shrink: 0;
  }
  .log-entries {
    flex: 1; overflow-y: auto; padding: 0 0.75rem 1rem;
    display: flex; flex-direction: column; gap: 5px;
  }
  .log-entries::-webkit-scrollbar { width: 4px; }
  .log-entries::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }
  .log-empty { color: var(--muted); font-size: 0.78rem; font-style: italic; padding: 0.5rem; }
  .log-entry {
    display: flex; align-items: center; gap: 8px;
    padding: 0.5rem 0.75rem; border-radius: 7px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    animation: entryIn 0.3s ease;
  }
  @keyframes entryIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .log-badge {
    background: var(--gold-glow); border: 1px solid rgba(200,169,110,0.25);
    border-radius: 5px; padding: 2px 7px;
    font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--accent);
    flex-shrink: 0; min-width: 38px; text-align: center;
  }
  .log-meta { flex: 1; min-width: 0; }
  .log-file { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-time { font-size: 0.65rem; color: var(--muted); opacity: 0.6; margin-top: 1px; }
  .sidebar-footer {
    padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .btn-reset {
    width: 100%; padding: 0.5rem; background: transparent;
    border: 1px solid var(--border); border-radius: 7px; color: var(--muted);
    font-family: 'Source Sans 3', sans-serif; font-size: 0.78rem;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .btn-reset:hover { border-color: rgba(255,100,100,0.4); color: #ff8080; }
</style>
</head>
<body>
<div class="layout">

  <!-- MAIN -->
  <div class="main">
    <header>
      <div class="header-left">
        <h1>Емтихан билеттері</h1>
        <p>Картаны басыңыз — файл автоматты жүктеледі</p>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="stat-remaining">60</div>
          <div class="stat-label">қалды</div>
        </div>
        <div class="stat">
          <div class="stat-num green" id="stat-taken">0</div>
          <div class="stat-label">берілді</div>
        </div>
      </div>
    </header>

    <div class="alert-bar" id="alert-bar">
      <div class="alert-dot"></div>
      <div class="alert-text">
        <strong id="alert-title">Билет берілді</strong>&nbsp;<span id="alert-time"></span>
      </div>
    </div>

    <div class="grid-wrap">
      <div class="grid-label">Билетті таңдаңыз</div>
      <div class="tickets-grid" id="grid"></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Журнал / Тізім</div>
      <div class="sidebar-counts">
        <div class="sc-item">
          <div class="sc-num gold" id="sc-taken">0</div>
          <div class="sc-label">берілді</div>
        </div>
        <div class="sc-item">
          <div class="sc-num green" id="sc-remaining">60</div>
          <div class="sc-label">қалды</div>
        </div>
      </div>
    </div>
    <div class="sidebar-list-label">Таңдалған билеттер</div>
    <div class="log-entries" id="log-entries">
      <div class="log-empty" id="log-empty">Әлі ешкім таңдаған жоқ</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-reset" onclick="resetAll()">↺ Сбросить всё</button>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
    </div>
    <div class="modal-num" id="modal-num">01</div>
    <div class="modal-label">Сіздің емтихан билетіңіз</div>
    <div class="modal-filename" id="modal-filename">Емтихан_билеті_01.docx</div>
    <a class="btn-download" id="btn-download" href="#" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Жүктеу / Скачать
    </a>
    <button class="btn-close" id="btn-close">Жабу / Закрыть</button>
  </div>
</div>

<script>
  const TOTAL = 60;
  const taken = new Set();
  let currentNum = null;
  let alertTimer = null;

  const grid        = document.getElementById('grid');
  const overlay     = document.getElementById('overlay');
  const modalNum    = document.getElementById('modal-num');
  const modalFn     = document.getElementById('modal-filename');
  const btnDownload = document.getElementById('btn-download');
  const btnClose    = document.getElementById('btn-close');
  const alertBar    = document.getElementById('alert-bar');
  const alertTitle  = document.getElementById('alert-title');
  const alertTime   = document.getElementById('alert-time');
  const logEntries  = document.getElementById('log-entries');

  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function filename(n) { return 'Емтихан_билеті_' + pad(n) + '.docx'; }

  // Build grid
  for (let i = 1; i <= TOTAL; i++) {
    const card = document.createElement('div');
    card.className = 'ticket-card';
    card.id = 'card-' + i;
    card.innerHTML = `
      <div class="card-num">${pad(i)}</div>
      <div class="card-word">Билет</div>
      <div class="card-deco"><span></span><span></span></div>`;
    card.addEventListener('click', () => openTicket(i));
    grid.appendChild(card);
  }

  function openTicket(num) {
    currentNum = num;
    const fn = filename(num);
    modalNum.textContent = pad(num);
    modalFn.textContent = fn;
    btnDownload.setAttribute('href', fn);
    btnDownload.setAttribute('download', fn);
    overlay.classList.add('open');
  }

  function closeModal() { overlay.classList.remove('open'); }

  function closeAndTake() {
    const num = currentNum;
    if (!num || taken.has(num)) { closeModal(); return; }
    taken.add(num);
    vanishCard(num);
    updateCounts();
    showAlert(num);
    addLog(num);
    closeModal();
  }

  btnClose.addEventListener('click', closeAndTake);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeAndTake(); });

  btnDownload.addEventListener('click', () => {
    const num = currentNum;
    if (!num || taken.has(num)) return;
    taken.add(num);
    vanishCard(num);
    updateCounts();
    showAlert(num);
    addLog(num);
    setTimeout(() => overlay.classList.remove('open'), 500);
  });

  function vanishCard(num) {
    const card = document.getElementById('card-' + num);
    if (!card) return;
    card.classList.add('vanishing');
    setTimeout(() => card.classList.add('gone'), 420);
  }

  function updateCounts() {
    const t = taken.size, r = TOTAL - t;
    document.getElementById('stat-taken').textContent    = t;
    document.getElementById('stat-remaining').textContent = r;
    document.getElementById('sc-taken').textContent      = t;
    document.getElementById('sc-remaining').textContent  = r;
  }

  function showAlert(num) {
    if (alertTimer) clearTimeout(alertTimer);
    const t = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    alertTitle.textContent = 'Билет № ' + pad(num) + ' — берілді';
    alertTime.textContent  = t;
    alertBar.classList.add('visible');
    alertTimer = setTimeout(() => alertBar.classList.remove('visible'), 5000);
  }

  function addLog(num) {
    const empty = document.getElementById('log-empty');
    if (empty) empty.remove();
    const t = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `
      <div class="log-badge">${pad(num)}</div>
      <div class="log-meta">
        <div class="log-file">${filename(num)}</div>
        <div class="log-time">${t}</div>
      </div>`;
    logEntries.prepend(entry);
  }

  function resetAll() {
    if (!confirm('Сбросить список и показать все билеты снова?')) return;
    taken.clear();
    document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('vanishing', 'gone'));
    updateCounts();
    logEntries.innerHTML = '<div class="log-empty" id="log-empty">Әлі ешкім таңдаған жоқ</div>';
    alertBar.classList.remove('visible');
  }
</script>
</body>
</html>
